server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 30d;
        try_files $uri =404;
    }

    # SPA fallback: try exact file, then .html, then index.html (Kobweb SPA router)
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
